<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>句子复习闯关 - 像素勇者英语课</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stage-box {
            border: 4px solid var(--border-color);
            background: #FFF;
            box-shadow: 5px 5px 0 var(--border-color);
            padding: 16px;
            margin-bottom: 14px;
        }

        .big-title {
            font-family: var(--font-cn);
            font-size: 30px;
            font-weight: 800;
            text-align: center;
            color: var(--primary-accent);
            margin-bottom: 10px;
        }

        .big-line {
            font-family: var(--font-cn);
            font-size: 30px;
            text-align: center;
            margin: 8px 0;
            min-height: 42px;
        }

        .en-line {
            font-family: var(--font-en);
            font-size: 26px;
            text-align: center;
            line-height: 1.5;
            color: #1F2937;
            margin: 10px 0;
            min-height: 78px;
            text-transform: none;
        }

        .review-img {
            width: 320px;
            height: 320px;
            object-fit: contain;
            image-rendering: pixelated;
            border: 3px dashed #94A3B8;
            background: #F8FAFC;
            display: block;
            margin: 0 auto 12px auto;
            padding: 8px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, minmax(260px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .opt-btn {
            border: 3px solid var(--border-color);
            background: #F4F4F4;
            box-shadow: 3px 3px 0 var(--border-color);
            font-family: var(--font-cn);
            font-size: 30px;
            font-weight: 700;
            line-height: 1.45;
            padding: 14px;
            cursor: pointer;
            text-transform: none;
        }

        .status {
            font-family: var(--font-cn);
            text-align: center;
            font-size: 30px;
            font-weight: 800;
            min-height: 44px;
            margin-top: 10px;
        }

        .status.ok { color: #166534; }
        .status.bad { color: #B00020; }

        .hud {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .panel {
            border: 3px solid var(--border-color);
            background: #FFF;
            padding: 8px;
            text-align: center;
            font-family: var(--font-cn);
            font-size: 20px;
            font-weight: 700;
        }

        .actions {
            text-align: center;
            margin-top: 12px;
        }

        @media (max-width: 900px) {
            .options {
                grid-template-columns: 1fr;
            }

            .en-line {
                font-size: 20px;
            }

            .opt-btn {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div style="width: 100%; max-width: 980px;">
        <a href="lesson2.html" class="pixel-btn back-btn" style="text-decoration: none; display: inline-block;">⬅ 返回第二课</a>
    </div>

    <h1>🧭 句子复习闯关（上节课）</h1>

    <div class="pixel-panel" style="max-width: 980px;">
        <div class="stage-box" id="learn-stage">
            <div class="big-title" id="learn-title">认读模式：介词学习</div>
            <img id="learn-img" class="review-img" src="" alt="preposition" onerror="this.style.display='none'">
            <div class="big-line" id="learn-en"></div>
            <div class="big-line" id="learn-cn" style="color:#B45309;"></div>
            <div class="actions">
                <button class="pixel-btn" id="learn-reveal-btn" style="background:#6B46C1; color:#FFF;" onclick="revealMeaning()">🀄 显示中文释义</button>
                <button class="pixel-btn" id="learn-next-btn" style="display:none; background:#2D3748; color:#FFF;" onclick="nextLearnCard()">➡️ 下一个</button>
            </div>
        </div>

        <div class="stage-box" id="quiz-stage" style="display:none;">
            <div class="big-title">句子复习关：情景问答（A/B对战）</div>
            <div class="hud">
                <div class="panel">玩家 A：<span id="score-a">0</span></div>
                <div class="panel">当前回合：<span id="turn-player">A</span></div>
                <div class="panel">玩家 B：<span id="score-b">0</span></div>
            </div>
            <img id="quiz-hint-img" class="review-img" src="" alt="hint" onerror="this.style.display='none'" style="width:240px;height:240px;">
            <div class="big-line" id="quiz-scene"></div>
            <div class="options" id="quiz-options"></div>
            <div class="status" id="quiz-status"></div>
            <div class="actions">
                <button class="pixel-btn" id="quiz-next-btn" onclick="nextQuestion()" style="display:none; background:#2D3748; color:#FFF;">➡️ 下一题</button>
            </div>
        </div>

        <div class="stage-box" id="finish-stage" style="display:none; text-align:center;">
            <div class="big-title">复习完成！</div>
            <div class="big-line" id="finish-line"></div>
        </div>
    </div>

    <script>
        const learnRounds = 3;

        const prepCards = [
            { en: 'on', cn: '在……上面', img: '../img/on.png', audio: '../audio/on.MP3' },
            { en: 'in', cn: '在……里面', img: '../img/in.png', audio: '../audio/in.MP3' },
            { en: 'next to', cn: '在……旁边', img: '../img/next_to.png', audio: '../audio/next_to.MP3' }
        ];

        const baseQuizBank = [
            {
                scene: '情景：老师问你“苹果在哪里？”',
                hintImg: '../img/on.png',
                options: [
                    'Where is the apple?',
                    'The apple is on the table.',
                    'Where is the orange?'
                ],
                answer: 'Where is the apple?'
            },
            {
                scene: '情景：请回答“苹果在桌子上”。',
                hintImg: '../img/on.png',
                options: [
                    'The orange is in the box.',
                    'The apple is on the table.',
                    'The potato is next to the ball.'
                ],
                answer: 'The apple is on the table.'
            },
            {
                scene: '情景：老师问你“橙子在哪里？”',
                hintImg: '../img/in.png',
                options: [
                    'Where is the potato?',
                    'Where is the orange?',
                    'Where is the apple?'
                ],
                answer: 'Where is the orange?'
            },
            {
                scene: '情景：请回答“橙子在盒子里”。',
                hintImg: '../img/in.png',
                options: [
                    'The orange is in the box.',
                    'The apple is on the table.',
                    'The potato is next to the ball.'
                ],
                answer: 'The orange is in the box.'
            },
            {
                scene: '情景：老师问你“土豆在哪里？”',
                hintImg: '../img/next_to.png',
                options: [
                    'Where is the potato?',
                    'Where is the orange?',
                    'Where is the apple?'
                ],
                answer: 'Where is the potato?'
            },
            {
                scene: '情景：请回答“土豆在球旁边”。',
                hintImg: '../img/next_to.png',
                options: [
                    'The orange is in the box.',
                    'The apple is on the table.',
                    'The potato is next to the ball.'
                ],
                answer: 'The potato is next to the ball.'
            },
            {
                scene: '情景：请选出“Where is the apple?”',
                hintImg: '../img/on.png',
                options: [
                    'Where is the orange?',
                    'Where is the apple?',
                    'Where is the potato?'
                ],
                answer: 'Where is the apple?'
            }
        ];
        let learnQueue = [];
        let currentLearn = null;
        let revealed = false;
        let learnAudio = null;
        let correctAudio = null;
        let wrongAudio = null;

        let quizQueue = [];
        let currentQuiz = null;
        let correctCount = 0;
        let currentPlayer = 'A';
        let scores = { A: 0, B: 0 };

        function shuffle(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        function playLearnAudio() {
            if (!currentLearn || !currentLearn.audio) return;
            if (learnAudio) learnAudio.pause();
            learnAudio = new Audio(currentLearn.audio);
            learnAudio.play().catch(() => {});
        }

        function playCorrect() {
            if (!correctAudio) return;
            correctAudio.currentTime = 0;
            correctAudio.play().catch(() => {});
        }

        function playWrong() {
            if (!wrongAudio) return;
            wrongAudio.currentTime = 0;
            wrongAudio.play().catch(() => {});
        }

        function startLearn() {
            learnQueue = shuffle(Array.from({ length: learnRounds }, () => prepCards).flat());
            currentLearn = learnQueue.pop() || null;
            revealed = false;
            renderLearn();
            playLearnAudio();
        }

        function renderLearn() {
            if (!currentLearn) {
                startQuiz();
                return;
            }
            document.getElementById('learn-title').innerText = `认读模式：介词学习（剩余 ${learnQueue.length + 1} / ${prepCards.length * learnRounds}）`;
            document.getElementById('learn-img').style.display = 'block';
            document.getElementById('learn-img').src = currentLearn.img;
            document.getElementById('learn-en').innerText = currentLearn.en;
            document.getElementById('learn-cn').innerText = revealed ? currentLearn.cn : '';
            document.getElementById('learn-reveal-btn').style.display = revealed ? 'none' : 'inline-block';
            document.getElementById('learn-next-btn').style.display = revealed ? 'inline-block' : 'none';
        }

        function revealMeaning() {
            revealed = true;
            renderLearn();
        }

        function nextLearnCard() {
            currentLearn = learnQueue.pop() || null;
            revealed = false;
            renderLearn();
            playLearnAudio();
        }

        function buildQuiz14() {
            const round1 = shuffle(baseQuizBank);
            let round2 = shuffle(baseQuizBank);

            if (round2.length > 1 && round1[round1.length - 1].scene === round2[0].scene) {
                round2.push(round2.shift());
            }

            const out = [...round1, ...round2];

            for (let i = 1; i < out.length; i++) {
                if (out[i].scene === out[i - 1].scene) {
                    for (let j = i + 1; j < out.length; j++) {
                        if (out[j].scene !== out[i - 1].scene) {
                            const temp = out[i];
                            out[i] = out[j];
                            out[j] = temp;
                            break;
                        }
                    }
                }
            }

            return out;
        }

        function updateHUD() {
            document.getElementById('turn-player').innerText = currentPlayer;
            document.getElementById('score-a').innerText = scores.A;
            document.getElementById('score-b').innerText = scores.B;
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 'A' ? 'B' : 'A';
            updateHUD();
        }

        function startQuiz() {
            document.getElementById('learn-stage').style.display = 'none';
            document.getElementById('quiz-stage').style.display = 'block';
            quizQueue = buildQuiz14();
            currentQuiz = null;
            correctCount = 0;
            currentPlayer = 'A';
            scores = { A: 0, B: 0 };
            updateHUD();
            nextQuestion();
        }

        function renderQuiz() {
            if (!currentQuiz) return;
            document.getElementById('quiz-scene').innerText = currentQuiz.scene;
            const hint = document.getElementById('quiz-hint-img');
            hint.style.display = 'block';
            hint.src = currentQuiz.hintImg;

            const wrap = document.getElementById('quiz-options');
            wrap.innerHTML = '';
            currentQuiz.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = opt;
                b.onclick = () => answerQuiz(opt);
                wrap.appendChild(b);
            });
            document.getElementById('quiz-status').innerText = '';
            document.getElementById('quiz-status').className = 'status';
            document.getElementById('quiz-next-btn').style.display = 'none';
        }

        function answerQuiz(selected) {
            if (!currentQuiz) return;
            const status = document.getElementById('quiz-status');
            const isRight = selected === currentQuiz.answer;
            if (isRight) {
                playCorrect();
                correctCount += 1;
                scores[currentPlayer] += 1;
                status.innerText = `✅ 玩家 ${currentPlayer} 正确！`;
                status.className = 'status ok';
            } else {
                playWrong();
                status.innerText = `❌ 玩家 ${currentPlayer} 错误，正确答案是：${currentQuiz.answer}`;
                status.className = 'status bad';
            }
            updateHUD();
            document.querySelectorAll('#quiz-options .opt-btn').forEach(btn => btn.disabled = true);
            document.getElementById('quiz-next-btn').style.display = 'inline-block';
        }

        function nextQuestion() {
            if (currentQuiz) switchPlayer();
            currentQuiz = quizQueue.pop() || null;
            if (!currentQuiz) {
                finishAll();
                return;
            }
            renderQuiz();
        }

        function finishAll() {
            document.getElementById('quiz-stage').style.display = 'none';
            document.getElementById('finish-stage').style.display = 'block';
            let winner = '平局';
            if (scores.A > scores.B) winner = '玩家 A 胜';
            if (scores.B > scores.A) winner = '玩家 B 胜';
            document.getElementById('finish-line').innerText = `本次答对 ${correctCount} / 14 题｜A:${scores.A} B:${scores.B}｜${winner}`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            correctAudio = new Audio('../audio/correct.MP3');
            correctAudio.preload = 'auto';
            wrongAudio = new Audio('../audio/wrong.MP3');
            wrongAudio.preload = 'auto';
            startLearn();
        });
    </script>
</body>
</html>
