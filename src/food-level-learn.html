<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食物分级认读营 - 像素勇者英语课</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .mode-switch, .level-switch {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .mode-btn, .level-btn {
            border: 3px solid var(--border-color);
            background: #EFEFEF;
            color: #111;
            padding: 10px 16px;
            font-family: var(--font-cn);
            font-size: 18px;
            cursor: pointer;
            box-shadow: 3px 3px 0 var(--border-color);
        }

        .mode-btn.active, .level-btn.active {
            background: var(--secondary-accent);
        }

        .level-btn.locked {
            background: #D1D5DB;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            opacity: 0.9;
        }

        .hidden { display: none !important; }

        .single-card {
            max-width: 560px;
            margin: 0 auto;
            border: 4px solid var(--border-color);
            background: #FFF;
            box-shadow: 6px 6px 0 var(--border-color);
            padding: 18px;
            text-align: center;
            min-height: 360px;
            cursor: pointer;
            user-select: none;
        }

        .single-card img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            image-rendering: pixelated;
            margin: 10px auto;
            display: block;
        }

        .single-en {
            font-family: var(--font-en);
            font-size: 26px;
            color: var(--primary-accent);
            min-height: 38px;
            text-transform: none;
        }

        .single-cn {
            font-family: var(--font-cn);
            font-size: 28px;
            color: #111;
            min-height: 44px;
            margin-top: 10px;
        }

        .hint {
            text-align: center;
            color: #666;
            font-family: var(--font-cn);
            margin: 12px 0;
        }

        .nav-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .challenge-box {
            border: 4px solid var(--border-color);
            background: #FFF;
            box-shadow: 6px 6px 0 var(--border-color);
            padding: 16px;
            max-width: 780px;
            margin: 0 auto;
        }

        .q-title {
            text-align: center;
            font-family: var(--font-cn);
            color: #555;
            margin-bottom: 8px;
        }

        .q-main {
            text-align: center;
            min-height: 210px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .q-main img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .q-en {
            font-family: var(--font-en);
            font-size: 26px;
            color: var(--primary-accent);
            text-transform: none;
        }

        .q-cn {
            font-family: var(--font-cn);
            font-size: 24px;
            color: #111;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .opt {
            border: 3px solid var(--border-color);
            background: #F5F5F5;
            box-shadow: 3px 3px 0 var(--border-color);
            font-family: var(--font-cn);
            font-size: 20px;
            padding: 10px;
            cursor: pointer;
        }

        .feedback {
            min-height: 30px;
            text-align: center;
            font-family: var(--font-cn);
            font-size: 22px;
            margin-top: 10px;
            font-weight: bold;
        }

        .score-line {
            text-align: center;
            font-family: var(--font-en);
            color: #333;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div style="width: 100%; max-width: 1000px;">
        <a href="lesson2.html" class="pixel-btn back-btn" style="text-decoration: none; display: inline-block;">⬅ 返回大厅</a>
    </div>

    <h1>🍎 食物分级认读营</h1>

    <div class="pixel-panel" style="max-width: 1000px;">
        <div class="mode-switch">
            <button class="mode-btn active" data-mode="learn" onclick="switchMode('learn')">📚 学习模式</button>
            <button class="mode-btn" data-mode="challenge" onclick="switchMode('challenge')">⚔️ 挑战模式</button>
        </div>

        <div class="level-switch">
            <button class="level-btn active" data-level="1" onclick="switchLevel(1)">Level 1</button>
            <button class="level-btn locked" data-level="2" onclick="switchLevel(2)">Level 2（锁定）</button>
            <button class="level-btn locked" data-level="3" onclick="switchLevel(3)">Level 3（锁定）</button>
        </div>

        <p class="hint" id="meta-line">当前：Level 1</p>

        <div id="view-learn">
            <p class="hint">每个单词按 3 次点击：①声音+英文 → ②图片 → ③中文释义</p>
            <div class="single-card" id="learn-card" onclick="nextLearnStep()">
                <div class="single-en" id="learn-en">Click To Start</div>
                <img id="learn-img" class="hidden" src="" alt="word-img" onerror="this.style.display='none'">
                <div class="single-cn hidden" id="learn-cn"></div>
            </div>
            <div class="nav-row">
                <button class="pixel-btn" onclick="prevWord()">⬅ 上一个词</button>
                <button class="pixel-btn submit" onclick="nextWord()">下一个词 ➡</button>
            </div>
        </div>

        <div id="view-challenge" class="hidden">
            <p class="hint">题型：看图说英文 / 看英文说中文 / 听录音选释义（每个词只出现 1 次，乱序）</p>
            <div class="score-line">SCORE: <span id="score">0</span> / <span id="total">0</span></div>
            <div class="challenge-box">
                <div class="q-title" id="q-title">点击开始挑战</div>
                <div class="q-main" id="q-main"></div>
                <div class="options" id="q-options"></div>
                <div class="feedback" id="feedback"></div>
                <div class="nav-row">
                    <button class="pixel-btn submit" id="start-challenge-btn" onclick="startChallenge()">开始挑战</button>
                    <button class="pixel-btn submit hidden" id="next-q-btn" onclick="nextQuestion()">下一题</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const levelData = {
            1: [
                { en: 'apple', cn: '苹果', img: '../img/apple.png' },
                { en: 'banana', cn: '香蕉', img: '../img/banana.png' },
                { en: 'orange', cn: '橙子', img: '../img/orange.png' },
                { en: 'carrot', cn: '胡萝卜', img: '../img/carrot.png' },
                { en: 'potato', cn: '土豆', img: '../img/potato.png' },
                { en: 'burger', cn: '汉堡', img: '../img/burger.png' },
                { en: 'sausage', cn: '香肠', img: '../img/sausage.png' },
                { en: 'milk', cn: '牛奶', img: '../img/milk.png' },
                { en: 'juice', cn: '果汁', img: '../img/juice.png' },
                { en: 'water', cn: '水', img: '../img/water.png' },
                { en: 'bread', cn: '面包', img: '../img/bread.png' },
                { en: 'egg', cn: '鸡蛋', img: '../img/egg.png' },
                { en: 'rice', cn: '米饭', img: '../img/rice.png' },
                { en: 'chocolate', cn: '巧克力', img: '../img/chocolate.png' },
                { en: 'ice cream', cn: '冰淇淋', img: '../img/icecream.png' }
            ],
            2: [
                { en: 'grape', cn: '葡萄', img: '../img/grape.png' },
                { en: 'lemon', cn: '柠檬', img: '../img/lemon.png' },
                { en: 'mango', cn: '芒果', img: '../img/mango.png' },
                { en: 'pear', cn: '梨', img: '../img/pear.png' },
                { en: 'watermelon', cn: '西瓜', img: '../img/watermelon.png' },
                { en: 'onion', cn: '洋葱', img: '../img/onion.png' },
                { en: 'chicken', cn: '鸡肉', img: '../img/chicken.png' },
                { en: 'coffee', cn: '咖啡', img: '../img/coffee.png' },
                { en: 'lemonade', cn: '柠檬水', img: '../img/lemonade.png' },
                { en: 'milkshake', cn: '奶昔', img: '../img/milkshake.png' },
                { en: 'cheese', cn: '奶酪', img: '../img/cheese.png' },
                { en: 'noodles', cn: '面条', img: '../img/noodles.png' },
                { en: 'pancake', cn: '煎饼', img: '../img/pancake.png' },
                { en: 'pasta', cn: '意大利面', img: '../img/pasta.png' },
                { en: 'sandwich', cn: '三明治', img: '../img/sandwich.png' }
            ],
            3: [
                { en: 'coconut', cn: '椰子', img: '../img/coconut.png' },
                { en: 'kiwi', cn: '猕猴桃', img: '../img/kiwi.png' },
                { en: 'fish', cn: '鱼', img: '../img/fish.png' },
                { en: 'pie', cn: '馅饼', img: '../img/pie.png' },
                { en: 'salad', cn: '沙拉', img: '../img/salad.png' },
                { en: 'soup', cn: '汤', img: '../img/soup.png' },
                { en: 'candy', cn: '糖果', img: '../img/candy.png' },
                { en: 'sauce', cn: '酱汁', img: '../img/sauce.png' },
                { en: 'sugar', cn: '糖', img: '../img/sugar.png' }
            ]
        };

        const LOCKED_LEVELS = new Set([2, 3]);

        let mode = 'learn';
        let currentLevel = 1;
        let wordIndex = 0;
        let learnStep = 0;
        let currentAudio = null;

        let challengeQueue = [];
        let qIndex = -1;
        let score = 0;

        function shuffle(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        function getAudioPath(word) {
            return `../audio/${word}.MP3`;
        }

        function toTitleCase(word) {
            return word.split(' ').map(part => {
                if (!part) return part;
                return part.charAt(0).toUpperCase() + part.slice(1).toLowerCase();
            }).join(' ');
        }

        function playAudio(word) {
            if (currentAudio) currentAudio.pause();
            currentAudio = new Audio(getAudioPath(word));
            currentAudio.play().catch(() => {});
        }

        function switchMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.mode-btn[data-mode="${m}"]`).classList.add('active');
            document.getElementById('view-learn').classList.toggle('hidden', m !== 'learn');
            document.getElementById('view-challenge').classList.toggle('hidden', m !== 'challenge');
            if (m === 'learn') resetLearnCard();
        }

        function switchLevel(level) {
            if (LOCKED_LEVELS.has(level)) {
                document.getElementById('meta-line').innerText = `Level ${level} 当前锁定（本节课仅开放 Level 1）`;
                return;
            }

            currentLevel = level;
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.level-btn[data-level="${level}"]`).classList.add('active');
            document.getElementById('meta-line').innerText = `当前：Level ${level}`;
            wordIndex = 0;
            resetLearnCard();
            resetChallengeUI();
        }

        function currentWords() {
            return levelData[currentLevel] || [];
        }

        function resetLearnCard() {
            const words = currentWords();
            if (!words.length) return;
            learnStep = 0;
            const w = words[wordIndex];
            document.getElementById('learn-en').innerText = `${toTitleCase(w.en)}（点击开始）`;
            document.getElementById('learn-img').src = w.img;
            document.getElementById('learn-img').classList.add('hidden');
            document.getElementById('learn-cn').innerText = w.cn;
            document.getElementById('learn-cn').classList.add('hidden');
        }

        function nextLearnStep() {
            const words = currentWords();
            if (!words.length) return;
            const w = words[wordIndex];
            const img = document.getElementById('learn-img');
            const cn = document.getElementById('learn-cn');
            const en = document.getElementById('learn-en');

            if (learnStep === 0) {
                en.innerText = toTitleCase(w.en);
                playAudio(w.en);
                learnStep = 1;
            } else if (learnStep === 1) {
                img.classList.remove('hidden');
                learnStep = 2;
            } else if (learnStep === 2) {
                cn.classList.remove('hidden');
                learnStep = 3;
            } else {
                nextWord();
            }
        }

        function nextWord() {
            const words = currentWords();
            if (!words.length) return;
            wordIndex = (wordIndex + 1) % words.length;
            resetLearnCard();
        }

        function prevWord() {
            const words = currentWords();
            if (!words.length) return;
            wordIndex = (wordIndex - 1 + words.length) % words.length;
            resetLearnCard();
        }

        function makeQuestion(word, allWords) {
            const types = ['img_to_en', 'en_to_cn', 'audio_to_cn'];
            const type = types[Math.floor(Math.random() * types.length)];

            const distractors = shuffle(allWords.filter(w => w.en !== word.en)).slice(0, 3);
            const cnOptions = shuffle([word.cn, ...distractors.map(d => d.cn)]);

            return {
                type,
                word,
                cnOptions
            };
        }

        function startChallenge() {
            const words = currentWords();
            challengeQueue = shuffle(words).map(w => makeQuestion(w, words));
            qIndex = -1;
            score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('total').innerText = challengeQueue.length;
            document.getElementById('start-challenge-btn').classList.add('hidden');
            nextQuestion();
        }

        function resetChallengeUI() {
            challengeQueue = [];
            qIndex = -1;
            score = 0;
            document.getElementById('score').innerText = '0';
            document.getElementById('total').innerText = '0';
            document.getElementById('q-title').innerText = '点击开始挑战';
            document.getElementById('q-main').innerHTML = '';
            document.getElementById('q-options').innerHTML = '';
            document.getElementById('feedback').innerText = '';
            document.getElementById('next-q-btn').classList.add('hidden');
            document.getElementById('start-challenge-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            qIndex++;
            document.getElementById('next-q-btn').classList.add('hidden');
            document.getElementById('feedback').innerText = '';

            if (qIndex >= challengeQueue.length) {
                document.getElementById('q-title').innerText = '挑战完成';
                document.getElementById('q-main').innerHTML = `<div class="q-cn">最终得分：${score} / ${challengeQueue.length}</div>`;
                document.getElementById('q-options').innerHTML = '';
                document.getElementById('start-challenge-btn').classList.remove('hidden');
                document.getElementById('start-challenge-btn').innerText = '再来一轮';
                return;
            }

            const q = challengeQueue[qIndex];
            renderQuestion(q);
        }

        function renderQuestion(q) {
            const qTitle = document.getElementById('q-title');
            const qMain = document.getElementById('q-main');
            const qOpts = document.getElementById('q-options');
            qMain.innerHTML = '';
            qOpts.innerHTML = '';

            if (q.type === 'img_to_en') {
                qTitle.innerText = `第 ${qIndex + 1} 题：看图片说英文`;
                qMain.innerHTML = `
                    <img src="${q.word.img}" alt="${q.word.en}" onerror="this.style.display='none'">
                    <button class="pixel-btn" onclick="revealEnglish('${q.word.en}')">我说完了，核对英文</button>
                `;
            } else if (q.type === 'en_to_cn') {
                qTitle.innerText = `第 ${qIndex + 1} 题：看英文说中文`;
                qMain.innerHTML = `<div class="q-en">${toTitleCase(q.word.en)}</div>`;
                q.word.cnOptions = q.cnOptions;
                q.cnOptions.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'opt';
                    b.innerText = opt;
                    b.onclick = () => answer(opt === q.word.cn, q.word.cn);
                    qOpts.appendChild(b);
                });
            } else {
                qTitle.innerText = `第 ${qIndex + 1} 题：听录音选中文`;
                qMain.innerHTML = `<button class="pixel-btn submit" onclick="playAudio('${q.word.en}')">🔊 播放录音</button>`;
                playAudio(q.word.en);
                q.cnOptions.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'opt';
                    b.innerText = opt;
                    b.onclick = () => answer(opt === q.word.cn, q.word.cn);
                    qOpts.appendChild(b);
                });
            }
        }

        function revealEnglish(en) {
            playAudio(en);
            document.getElementById('feedback').innerText = `答案：${toTitleCase(en)}`;
            document.getElementById('next-q-btn').classList.remove('hidden');
        }

        function answer(isCorrect, correctCn) {
            playAudio(challengeQueue[qIndex].word.en);
            if (isCorrect) {
                score++;
                document.getElementById('score').innerText = score;
                document.getElementById('feedback').innerText = '✅ 正确';
            } else {
                document.getElementById('feedback').innerText = `❌ 错误，正确答案：${correctCn}`;
            }
            document.getElementById('next-q-btn').classList.remove('hidden');
        }

        window.addEventListener('DOMContentLoaded', () => {
            switchLevel(1);
            switchMode('learn');
        });
    </script>
</body>
</html>
