<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奇房间寻宝 - 像素勇者英语课</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .room-container {
            position: relative;
            width: 800px;
            height: 500px;
            margin: 20px auto;
            border: 8px solid var(--border-color);
            background-size: cover;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: background-image 0.5s ease-in-out;
        }

        .treasure-item {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 10;
            image-rendering: pixelated;
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.3s;
            pointer-events: none;
        }

        .treasure-item.peek {
            opacity: 1;
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px var(--secondary-accent));
        }

        .instruction-box {
            background-color: #111;
            color: var(--tertiary-accent);
            padding: 15px;
            border: 4px solid var(--border-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .control-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .scenario-tab {
            background-color: #A9A9A9;
            color: white;
            border: 4px solid var(--border-color);
            padding: 10px 15px;
            font-family: var(--font-cn);
            font-size: 16px;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border-color);
            transition: all 0.1s;
        }

        .scenario-tab.active {
            background-color: #9370DB;
            color: white;
            border-color: #FFFFFF;
        }

        .scenario-tab:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border-color);
        }
    </style>
</head>
<body>
    <div style="width: 100%; max-width: 900px;">
        <a href="../index.html" class="pixel-btn back-btn" style="text-decoration: none; display: inline-block;">⬅ 返回大厅</a>
    </div>

    <h1>🏠 神奇房间寻宝：介词挑战</h1>

    <div class="pixel-panel" style="max-width: 1000px;">

        <div style="text-align: center; margin-bottom: 10px;">
            <div style="font-family: var(--font-cn); color: #888; margin-bottom: 10px;">—— 训练场景选择 (SELECT SCENARIO) ——</div>
            <div class="control-group" id="scenario-selector">
            </div>
        </div>

        <div class="instruction-box">
            <div id="mission-text" style="font-family: var(--font-en); font-size: 18px;">
                READY FOR MISSION?
            </div>
        </div>

        <div class="room-container" id="room-canvas">
            <img id="active-treasure" class="treasure-item" src="" alt="treasure">
        </div>

        <div class="control-group">
            <button class="pixel-btn submit" onclick="startNewMission()" style="display: inline-block; font-size: 20px;">
                🎲 随机藏匿 (HIDE)
            </button>
            <button class="pixel-btn" id="peek-btn" style="background-color: #00f3ff; color: #000; display: inline-block; font-size: 20px;" onmousedown="showTreasure()" onmouseup="hideTreasure()" ontouchstart="showTreasure()" ontouchend="hideTreasure()">
                👁️ 按住偷看 (PEEK)
            </button>
        </div>

        <p style="font-family: var(--font-cn); text-align: center; color: #555; font-size: 14px;">
            提示：“侦人”按住蓝色按钮看答案，描述位置，“搜寻者”在纸上贴贴纸。核对正确后切回档案发卡！
        </p>
    </div>

    <script src="app.js"></script>
    <script>
        const scenarioDatabase = [
            {
                name: "神奇教室 (Classroom)",
                bgSrc: "../img/classroom.png",
                anchors: [
                    { name: "on the table", top: "62%", left: "45%" },
                    { name: "under the table", top: "78%", left: "45%" },
                    { name: "on the chair", top: "65%", left: "15%" },
                    { name: "under the chair", top: "82%", left: "15%" },
                    { name: "in the cupboard", top: "40%", left: "75%" },
                    { name: "on the bed", top: "55%", left: "80%" },
                    { name: "under the bed", top: "85%", left: "80%" }
                ]
            },
            {
                name: "城堡房间 (Castle Room)",
                bgSrc: "../img/castle.png",
                anchors: [
                    { name: "on the bed", top: "60%", left: "20%" },
                    { name: "under the bed", top: "88%", left: "20%" },
                    { name: "on the table", top: "65%", left: "65%" },
                    { name: "under the table", top: "80%", left: "65%" },
                    { name: "in the box", top: "45%", left: "85%" },
                    { name: "on the chair", top: "60%", left: "55%" }
                ]
            },
            {
                name: "游戏室 (Playroom)",
                bgSrc: "../img/playroom.png",
                anchors: [
                    { name: "on the rug", top: "75%", left: "30%" },
                    { name: "under the shelf", top: "80%", left: "65%" },
                    { name: "on the chair", top: "62%", left: "10%" },
                    { name: "in the cupboard", top: "35%", left: "50%" },
                    { name: "on the bed", top: "60%", left: "85%" }
                ]
            }
        ];

        let activeScenarioIndex = 0;
        let currentAnchors = [];
        let currentMission = null;

        const elRoomCanvas = document.getElementById('room-canvas');
        const elSelector = document.getElementById('scenario-selector');
        const elTreasure = document.getElementById('active-treasure');
        const elMissionText = document.getElementById('mission-text');

        function initScenarioTabs() {
            elSelector.innerHTML = '';
            scenarioDatabase.forEach((scenario, index) => {
                const tab = document.createElement('div');
                tab.className = 'scenario-tab' + (activeScenarioIndex === index ? ' active' : '');
                tab.innerText = scenario.name;
                tab.onclick = () => {
                    changeScenario(index);
                };
                elSelector.appendChild(tab);
            });
        }

        function changeScenario(index) {
            activeScenarioIndex = index;
            const scenario = scenarioDatabase[index];
            elRoomCanvas.style.backgroundImage = `url('${scenario.bgSrc}')`;
            currentAnchors = scenario.anchors;

            updateMissionText(`SCENARIO: ${scenario.name.toUpperCase()}`, "#CD7F32");
            elTreasure.classList.remove('peek');
            currentMission = null;
            initScenarioTabs();
        }

        function updateMissionText(text, color) {
            elMissionText.innerText = text;
            elMissionText.style.color = color || "var(--tertiary-accent)";
        }

        function startNewMission() {
            if (currentAnchors.length === 0) {
                alert("长官，请先选择一个有效的训练场景！");
                return;
            }

            const targetVocabulary = cardDatabase.filter(card => {
                const idNum = parseInt(card.id.replace('card', ''));
                return idNum >= 10 && idNum <= 15;
            });

            const randomItem = targetVocabulary[Math.floor(Math.random() * targetVocabulary.length)];
            const randomAnchor = currentAnchors[Math.floor(Math.random() * currentAnchors.length)];

            currentMission = {
                item: randomItem,
                location: randomAnchor
            };

            elTreasure.src = randomItem.imgSrc;
            elTreasure.style.top = randomAnchor.top;
            elTreasure.style.left = randomAnchor.left;
            elTreasure.classList.remove('peek');

            updateMissionText(`TARGET: ${randomItem.enDesc.toUpperCase()}`, "var(--tertiary-accent)");
        }

        function showTreasure() {
            if (!currentMission) return;
            elTreasure.classList.add('peek');
        }

        function hideTreasure() {
            elTreasure.classList.remove('peek');
        }

        window.addEventListener('DOMContentLoaded', () => {
            initScenarioTabs();
            changeScenario(0);
        });
    </script>
</body>
</html>
