<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素勇者英语课 - 任务大厅</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <h1>🏰 像素勇者任务大厅</h1>

    <div class="pixel-panel" style="max-width: 600px; text-align: center;">
        <p style="font-family: var(--font-cn); color: var(--border-color); font-size: 18px; margin-bottom: 30px;">
            欢迎来到前线营地！请选择你要前往的区域：
        </p>

        <a href="src/register.html" class="pixel-btn submit" style="display: block; width: 80%; margin: 15px auto;">⚔️ 招募新勇者 (Register)</a>
        <a href="src/dashboard.html" class="pixel-btn" style="display: block; width: 80%; margin: 15px auto; background-color: #F4B41A; color: #111;">🏅 勇者档案 (Dashboard)</a>

        <div style="border-top: 4px dashed #CCC; margin: 30px 0;"></div>

        <h3 style="color: var(--primary-accent);">— 课程分页 —</h3>

        <a href="src/lesson1.html" class="pixel-btn" style="display: block; width: 80%; margin: 15px auto; background-color: #43B047; color: #FFF;">📘 第一课</a>
        <a href="src/lesson2.html" class="pixel-btn" style="display: block; width: 80%; margin: 15px auto; background-color: #2F855A; color: #FFF;">📗 第二课</a>

        <div style="border-top: 4px dashed #CCC; margin: 30px 0;"></div>

        <h3 style="color: var(--primary-accent);">— 辅助工具 —</h3>

        <a href="src/timer.html" class="pixel-btn" style="display: block; width: 80%; margin: 15px auto; background-color: #A0AEC0; color: #111;">⏱️ 炸弹倒计时 (Timer)</a>
        <a href="src/worksheet.html" class="pixel-btn" style="display: block; width: 80%; margin: 15px auto; background-color: #A0AEC0; color: #111;">🖨️ 冒险日志打印 (Worksheet)</a>

    </div>

    <script src="src/app.js"></script>
</body>
</html>
